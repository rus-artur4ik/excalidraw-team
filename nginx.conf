server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        application/javascript
        text/javascript
        application/json
        text/css
        image/svg+xml
        application/manifest+json
        application/wasm
        font/ttf;

    # content-hashed bundles and fonts are immutable — cache forever
    location ~* \.woff2$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~* ^/(assets|fonts)/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # the HTML shell must always revalidate so new deploys are picked up
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # client-side routes (/b/:id, /admin) must fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
