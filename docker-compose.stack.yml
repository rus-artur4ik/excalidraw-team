name: excalidraw-team-stack

# Full self-hosted stack: frontend (nginx) + ACL collab room + access-backend (MCP + files).
# Run from this directory with the sibling repos checked out at ../:
#   docker compose --env-file stack.env -f docker-compose.stack.yml up --build -d
# See DEPLOY.md.

services:
  room:
    build:
      context: ../excalidraw-room-acl
    environment:
      NODE_ENV: production
      PORT: "80"
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-excalidraw-team}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/service-account.json
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      CORS_ORIGIN: ${PUBLIC_APP_ORIGIN}
    volumes:
      - ./secrets/service-account.json:/secrets/service-account.json:ro
    restart: unless-stopped

  backend:
    build:
      context: ../excalidraw-mcp-collab
    environment:
      PORT: "3015"
      CORS_ORIGIN: ${PUBLIC_APP_ORIGIN}
      PUBLIC_BASE_URL: ${PUBLIC_BACKEND_URL}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-excalidraw-team}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/service-account.json
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY}
      # bot reaches the room over the internal docker network
      WS_SERVER_URL: http://room:80
      DATA_DIR: /data
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    volumes:
      - ./secrets/service-account.json:/secrets/service-account.json:ro
      - backend-data:/data
    depends_on:
      - room
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # baked into the static build — must be the BROWSER-facing URLs
        VITE_APP_FIREBASE_CONFIG: ${VITE_APP_FIREBASE_CONFIG}
        VITE_APP_WS_SERVER_URL: ${PUBLIC_WS_URL}
        VITE_APP_ACCESS_BACKEND_URL: ${PUBLIC_BACKEND_URL}
    depends_on:
      - room
      - backend
    restart: unless-stopped

  # single HTTP entrypoint; Cloudflare terminates TLS and sends HTTP here
  proxy:
    image: nginx:stable-alpine
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${PROXY_PORT:-18080}:80"
    depends_on:
      - frontend
      - room
      - backend
    restart: unless-stopped

volumes:
  backend-data:
